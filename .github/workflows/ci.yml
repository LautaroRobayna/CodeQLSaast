name: CI

on:
  pull_request:
  push:

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: material/codigo/backend

    steps:

      # Gitleaks
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Setup entorno .NET
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '6.0.x'

      # Restore + vulnerability scan
      - name: Vulnerability scan NuGet
        run: |
          dotnet restore
          dotnet list package --vulnerable --include-transitive
          if dotnet list package --vulnerable --include-transitive | grep -q "has the following vulnerable packages"; then
            echo "Se encontraron vulnerabilidades"
            exit 1
          fi

      # CodeQL init
      - name: CodeQL init
        uses: github/codeql-action/init@v3
        with:
          languages: csharp

      # Build (CodeQL lo observa)
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Linter
      - name: Linter
        run: dotnet format --verify-no-changes

      # CodeQL analyze
      - name: CodeQL analyze
        uses: github/codeql-action/analyze@v3

      # Tests
      - name: Tests
        run: dotnet test --no-build --configuration Release
