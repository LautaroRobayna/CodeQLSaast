name: CI

on:
  pull_request:
  push:

jobs:
  codeql:
    name: CodeQL SAST (${{ matrix.language }})
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: csharp
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}

      - name: Setup .NET (C# only)
        if: matrix.language == 'csharp'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Build .NET for CodeQL
        if: matrix.language == 'csharp'
        working-directory: Material/Codigo/Backend
        run: dotnet build --configuration Release

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: /language:${{ matrix.language }}

  build:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      pull-requests: read
    defaults:
      run:
        working-directory: Material/Codigo/Backend

    steps:

      # Gitleaks
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}

      # Setup entorno .NET
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      # Restore + vulnerability scan
      - name: Vulnerability scan NuGet
        run: |
          dotnet restore
          dotnet list package --vulnerable --include-transitive
          # Verificar solo vulnerabilidades Critical o High
          VULN_OUTPUT=$(dotnet list package --vulnerable --include-transitive 2>&1)
          if echo "$VULN_OUTPUT" | grep -E "(Critical|High)" | grep -q "has the following vulnerable packages"; then
            echo "Se encontraron vulnerabilidades Critical o High"
            exit 1
          else
            echo "No se encontraron vulnerabilidades Critical o High"
            if echo "$VULN_OUTPUT" | grep -q "Moderate"; then
              echo "Nota: Existen vulnerabilidades Moderate conocidas sin fix disponible"
            fi
          fi

      # Build
      - name: Build
        run: dotnet build --no-restore --configuration Release

      # Linter
      - name: Linter
        run: dotnet format --verify-no-changes

      # Tests
      - name: Tests
        run: dotnet test --no-build --configuration Release
